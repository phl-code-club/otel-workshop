#   storage:
#     path: /var/tempo/generator/wal
#     remote_write:
#       - url: http://collector:9090/api/v1/write
#         send_exemplars: true

query_frontend:
  rf1_after: "1999-01-01T00:00:00Z"
  mcp_server:
    enabled: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
