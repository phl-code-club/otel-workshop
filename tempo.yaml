distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
  log_received_spans:
    enabled: true
  log_discarded_spans:
    enabled: true

ingest:
  enabled: true
  kafka:
    address: redpanda:9092
    topic: tempo-ingest

# TODO: Uncomment when prometheus is working
