distributor:
  ingester_write_path_enabled: false
  kafka_write_path_enabled: true
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
  log_received_spans:
    enabled: true
  log_discarded_spans:
    enabled: true

ingest:
  enabled: true
  kafka:
    address: redpanda:9092
    topic: tempo-ingest

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
