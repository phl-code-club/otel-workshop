distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
  log_received_spans:
    enabled: true
  log_discarded_spans:
    enabled: true

ingest:
  enabled: true
  kafka:
    address: redpanda:9092
    topic: tempo-ingest

query_frontend:
  rf1_after: "1999-01-01T00:00:00Z"
  mcp_server:
    enabled: true

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
