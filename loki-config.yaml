auth_enabled: false
target: all

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3100
  grpc_listen_port: 9096

# Force memberlist to use explicit IP
memberlist:
  bind_addr:
    - 127.0.0.1
  advertise_addr: 127.0.0.1
  abort_if_cluster_join_fails: false
  join_members: []

schema_config:
  configs:
    - from: 2023-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

common:
  path_prefix: /loki
  replication_factor: 1
  compactor_address: http://backend:3100
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  # Key workaround: explicit address + empty interface list
  instance_addr: 127.0.0.1
  instance_interface_names: []

# Query frontend - explicit address
frontend:
  address: 127.0.0.1

# Ingester - explicit address + empty interface names
ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    address: 127.0.0.1
    interface_names: []

distributor:
  ring:
    kvstore:
      store: inmemory

storage_config:
  filesystem:
    directory: /loki/chunks

limits_config:
  allow_structured_metadata: true

compactor:
  working_directory: /tmp/compactor
