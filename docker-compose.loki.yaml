volumes:
  loki:

services:
  loki:
    image: docker.io/grafana/loki:3.5.12
    command: "-config.file=/etc/loki/config.yaml -target=all"
    user: 0:0
    ports:
      - 3100:3100
      - 7946
      - 9095
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml
      - loki:/loki/
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-health"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
