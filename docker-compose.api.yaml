services:
  auth-service:
    restart: always
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    environment:
      OTEL_SERVICE_NAME: "auth-service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://collector:4317"
      OTEL_NODE_DISABLED_INSTRUMENTATIONS: "fs,net,dns"
      DB_HOST: "postgres"
    depends_on:
      postgres:
        condition: service_healthy

  profile-service:
    restart: always
    build:
      context: ./profile-service
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    environment:
      OTEL_SERVICE_NAME: "profile-service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://collector:4317"
      DB_HOST: "postgres"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    ports:
      - 5432:5432
    volumes:
      - postgres:/data/db
      - ./db/:/docker-entrypoint-initdb.d/
    environment:
      - POSTGRES_USER=phlcodeclub
      - POSTGRES_PASSWORD=super-secret-password
      - POSTGRES_DB=otel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phlcodeclub -d otel"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  postgres:
