receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers:
        - otlp
      exporters:
        - debug
        - otlp_grpc/tempo
    metrics:
      receivers:
        - otlp
      exporters:
        - debug
        - otlp_grpc/tempo
    logs:
      receivers:
        - otlp
      exporters:
        - debug
        - otlp_grpc/tempo
