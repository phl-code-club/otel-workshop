receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 20s
          scrape_timeout: 10s
          static_configs:
            - targets:
                - "0.0.0.0:8888"
        - job_name: "redpanda"
          scrape_interval: 20s
          scrape_timeout: 10s
          static_configs:
            - targets:
                - "redpanda:9644"
          metrics_path: /public_metrics
        - job_name: "postgres"
          scrape_interval: 20s
          scrape_timeout: 10s
          static_configs:
            - targets:
                - "postgres-exporter:9187"

connectors:
  servicegraph:

exporters:
  otlp_http/loki:
    endpoint: http://loki:3100/otlp

  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:9090"
    translation_strategy: "UnderscoreEscapingWithoutSuffixes"
    resource_to_telemetry_conversion:
      enabled: true

  prometheus/servicegraph:
    endpoint: "0.0.0.0:9091"
    translation_strategy: "UnderscoreEscapingWithoutSuffixes"
    namespace: servicegraph
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 30
    spike_limit_percentage: 5

service:
  extensions:
    - health_check
    - zpages
  pipelines:
    traces:
      receivers:
        - otlp
      exporters:
        # Uncomment to enable debug loggin of traces
        # - debug
        - otlp_grpc/tempo
        - servicegraph
    metrics:
      receivers:
        - otlp
        - prometheus
        - servicegraph
      exporters:
        # Uncomment to enable debug loggin of metrics
        # - debug
        - prometheus
        - prometheus/servicegraph
    logs:
      receivers:
        - otlp
      exporters:
        # Uncomment to enable debug loggin of logs
        # - debug
        - otlp_http/loki
  telemetry:
    resource:
      service.name: otel-collector
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
                with_resource_constant_labels:
                  included:
                    - service.name
